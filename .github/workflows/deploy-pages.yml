# https://carderon.github.io/famidle/
#
# IMPORTANT (sinon erreur 404 sur deploy-pages) :
# Settings → Pages → Build and deployment → Source = « GitHub Actions »
# (Pas « Déployer depuis une branche » ni « Aucune source ».)
#
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build

      # Rafraîchir /famidle/play : GitHub sert 404.html sur les URLs inconnues
      - run: cp dist/index.html dist/404.html
      - run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
